##################################################################
###
### EBXÛ Site Configuration
###
###
### - Variable substitution syntax: ${myProp}
###		'myProp' value is first looked in System properties
###		then in this properties file. If still not
###		defined, it is substituted by "null" string.
### - Predefined System properties:
###		- 'ebx.vm.id'
###			VM id within the EBXÛ site.
###			Default is 1, it may be overridden by System property.
###		- 'log.defaultConversionPattern'
###			This property must be used by log configuration below.
###			It must not be modified.
##################################################################
## EBXÛ license file
## Define the license file using one of the following methods.
## If the license file is defined in multiple locations, the
## order of priority is shown below:
## 1. System property -Debx.license.file=<properties-file>.
## 2. Main ebx.properties configuration 'ebx.license.file'
##    property value.
## 3. Default: ${ebx.home}/ebx-license.properties
##    The file should have an 'ebx.license' property containing
##    the license key.
##################################################################
#ebx.license.file=
##################################################################
## Installation on first launch.
## All values are ignored if the repository is already installed.
##################################################################
## Enables repository installation on first startup (default is false).
## If set to true the license key wizard is disabled and the ebx.license property
## must be set to a valid license or updated upon license expiration.
#ebx.install.enabled=false
## Following properties configure the repository. Values are optional and defaults are automatically generated.
#ebx.install.repository.id=
#ebx.install.repository.label=
## Following properties specify the EBXÛ administrator. These are ignored if a custom directory is defined.
