#################################################
## Synchronized directory
#################################################
## Specifies the EBX external roles mapper.
## Used to map external roles coming from built-in configurations: LDAP, SCIM, OnLogin.
## possible values:
##      - "DEFAULT":
##             Default behaviour : External roles are used as specific roles without mapping.
##             the built-in roles Administrator and Read Only are mapped through
##             the properties : ebx.directory.synchronized.role.mapper.default.*.
##      - "SCRIPT" : use of scripts to map external roles.
##      - "CUSTOM" : an implementation of com.orchestranetworks.service.directory.api.ExternalRolesMapper
##                   to mention above
#ebx.directory.synchronized.role.mapper=
#ebx.directory.synchronized.role.mapper=
#ebx.directory.synchronized.role.mapper.default.administrator=
#ebx.directory.synchronized.role.mapper.default.read.only=
## Custom implementation of com.orchestranetworks.service.directory.api.ExternalRolesMapper
#ebx.directory.synchronized.role.mapper.custom.class=
## The allowed attributes to get from the LDAP response
## and persist in the synchronized directory user attributes.
#ebx.directory.synchronized.mapping.ldap.attributes=
## The name of an attribute that contains a role.
## An SAML 2.0 assertion may contain multiple attributes with the same name,
## if the name corresponds to the role name attribute each value will be considered as a role.
## Required if SCIM or OnLogin directory is enabled and SAML2 is used.
## Default value is Role.
#ebx.directory.synchronized.sso.mapping.saml2.attributes.role.name=
## the allowed attributes to get from the saml assertion
## and persist in the synchronized directory user attributes.
#ebx.directory.synchronized.sso.mapping.saml2.attributes=
## The name of the custom clam that contains a table of roles.
## Required if synchronized directory is enabled and OIDC is used.
#ebx.directory.synchronized.sso.mapping.oidc.claims.role.name=
## The allowed claims to get from the OIDC token
## and persisted in the synchronized directory user attributes.
#ebx.directory.synchronized.sso.mapping.oidc.claims=
## The name of the custom clam that contains a table of roles.
## Required if synchronized directory is enabled and BEARER authentication is used.
## Comma separated values.
#ebx.directory.synchronized.sso.mapping.bearer.claims.role.name=
## The allowed claims to get from the token
## and persisted in the synchronized directory user attributes.
## Note: when jwt is not configured, the user should be declared on the
##       synchronized directory to retrieve the claims.
#ebx.directory.synchronized.sso.mapping.bearer.claims=
## The attribute name that corresponds to the user mail.
#ebx.directory.synchronized.sso.mapping.attribute.mail=email
## The user display may be created using an expression from the attributes.
#ebx.directory.synchronized.sso.display.user=
## These listeners are called when a user logs in or logs out using SSO.
## Implementations of com.orchestranetworks.service.directory.sso.api.OnUserLoginListener
## and com.orchestranetworks.service.directory.sso.api.OnUserLogoutListener
## Comma separated values
