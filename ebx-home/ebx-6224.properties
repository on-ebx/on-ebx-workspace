################################################################
##
## EBX DIRECTORY CONFIGURATION
##
################################################################
## 1. Choose the main directory implementation.
## EBX operates with a main directory, which serves as the default authentication source.
## This main directory can be the default directory, the built-in LDAP directory,
## or any custom directory.
## Value must be the fully qualified name of the Java class that implements
## com.orchestranetworks.service.directory.DirectoryFactory
## To choose a main directory
##  - Default directory       : keep empty
##  - LDAP build-in directory : com.orchestranetworks.service.directory.ldap.LdapDirectoryFactory
##  - Custom directory        : the Java directory factory class name
## Depending on the selected directory, additional properties may be required:
## ebx.directory.ldap.*
#################################################
#ebx.directory.factory=
##################################################
## 2. Enabling and configuring SSO if needed.
## any non-empty value from these enables the SSO:
##    - "OIDC"    :   to use the configured OIDC.
##    - "SAML2"    :   to use the configured SAML2.
## Depending on the selected protocol, additional properties may be required from:
## ebx.directory.saml2.*, ebx.directory.oidc.* and ebx.directory.bearer.*
#ebx.directory.sso.protocol=
##################################################
## 3- Enable the synchronized directory
## When SSO or Centralized Authentication is enabled, a second directory,
## referred to as the synchronized directory, can be added to manage users
## authenticated via the identity provider. In this configuration,
## the main directory is preferably reserved for technical or service users,
## while the synchronized directory handles user accounts coming from the external system.
## Specifies the synchronized directory type
## any non-empty value from these enables the synchronized directory:
##    - "LDAP"    :    to use the built-in configured LDAP as source
##    - "SCIM"    :    to use the built-in configured SCIM as source
##    - "OnLogin" :    to use an on login strategy that only stores users that already
##                     logged in once using SSO.
## Depending on the selected synchronized directory, additional properties may be required:
## ebx.directory.synchronized.* , ebx.directory.ldap.* and ebx.directory.scim.*
#ebx.directory.synchronized.source=
####################################################################
## Built-in LDAP Directory
####################################################################
## 1- Connection: [ebx.directory.ldap.default]
##      required:                - .hostName
##                               - .port
##      optional:                - .connectionTimeOutInSeconds | default value: '30'   | possible values : positive integer
##                               - .bindDnOrUser               | default value is empty
##                               - .bindPassword               | default value is empty
##                               - .authenticationMethod       | default value: 'none' | possible values : 'simple', 'none'
##                               - .encryptionMethod           | default value: 'none' | possible values : 'ssl', 'tls', 'none'
##          Note: .bindDnOrUser and .bindPassword are required with simple authentication method.
## 2- Mapping: [ebx.directory.ldap.default.mapping]
##      required:   - .role.referenceAttribute      : the ldap attribute that contains the role name
##                  - .role.memberAttribute         : the ldap attribute that contains the users in a group entry
##                  - .role.builtin.administrator   : the ldap group associated to the builtin administrator role
##                  - .role.builtin.readOnly        : the ldap group associated to the builtin read-only role
##                  - .user.referenceAttribute      : the ldap attribute that contains the user name which will be used as a login
##                  - .user.referenceComponentInDN  : the ldap dn component that contains the username which will be used
##      optional:
##                  - .role.mailAttribute         : the ldap attribute that contains the role mail
##                  - .user.mailAttribute         : the ldap attribute that contains the user mail
##          Note: If not defined, the mails will not be handled.
## 3- Display: [ebx.directory.ldap.default.display]
##      optional:   - .role        : an expression using ldap attributes | example: {{cn}}-{{mail}} which gives: sales-salesTeam@mail.com
##                  - .user        : an expression using ldap attributes | example: {{salutation}} {{firstName}} {{lastName}} Mr John Doe
##                  - .users.all   : If true, all users are returned as profiles with the roles.
##          Note: display is not locale dependent yet.
## 4- Search request templates: [ebx.directory.ldap.default.request.{requestTemplateName}.{field}]
##   4.1- properties of each request template ({field}):
##      required:   - .baseDN                    : The request base search DN entry
##                  - .filter                    : The request filter
##      optional:   - .scope                     | default value: 'subtree'
##                                               | possible values :  'base','one','subtree'
##                  - .cache.expirationInSeconds | default value: '60'
##                                               | possible values :  positive 32 bit integer
##                  - .cache.maxSize             | default value: '1000'    | possible values :  positive 64 bit integer
##                  - .pageSize                  | default value: '100'     | possible values :  positive 32 bit integer
##                  - .timeLimitInSeconds        | default value: '30'      | possible values :  positive 32 bit integer
##          Note: Caches are used on every request template to enhance performance.
##                Putting 0 on .cache.maxSize and .cache.expirationInSeconds of a request template will
##                  disable its related cache.
##                Changing the .pageSize of a request template at server runtime will
##                  evict its related cache.
##   4.2- Request templates {requestTemplateName}:
##      required:   - .userSearch         : search a user                   | allowed placeholders : {{login}}
##                  - .userGroupsSearch   : search groups of a user         | allowed placeholders : {{login}},{{dn}}
##                  - .groupUsersSearch   : search the users under a group  | allowed placeholders : {{role}}
##                  - .allGroupsSearch    : search all groups               | allowed placeholders :
##                  - .allUsersSearch     : search all users                | allowed placeholders :
####################################################################
## 1- Connection
#ebx.directory.ldap.default.hostName=
#ebx.directory.ldap.default.port=
#ebx.directory.ldap.default.bindDnOrUser=
#ebx.directory.ldap.default.bindPassword=
#ebx.directory.ldap.default.authenticationMethod=
#ebx.directory.ldap.default.encryptionMethod=
## 2- Mapping
#ebx.directory.ldap.default.mapping.role.referenceAttribute=
#ebx.directory.ldap.default.mapping.role.memberAttribute=
#ebx.directory.ldap.default.mapping.user.referenceAttribute=
#ebx.directory.ldap.default.mapping.user.referenceComponentInDN=
#ebx.directory.ldap.default.mapping.role.mailAttribute=
#ebx.directory.ldap.default.mapping.user.mailAttribute=
## 3- Display
#ebx.directory.ldap.default.display.role=
#ebx.directory.ldap.default.display.user=
#ebx.directory.ldap.default.display.users.all=
## 4- Request templates
#ebx.directory.ldap.default.request.userSearch.baseDN=
#ebx.directory.ldap.default.request.userSearch.filter=
#ebx.directory.ldap.default.request.userGroupsSearch.baseDN=
#ebx.directory.ldap.default.request.userGroupsSearch.filter=
#ebx.directory.ldap.default.request.allGroupsSearch.baseDN=
#ebx.directory.ldap.default.request.allGroupsSearch.filter=
#ebx.directory.ldap.default.request.allUsersSearch.baseDN=
#ebx.directory.ldap.default.request.allUsersSearch.filter=
