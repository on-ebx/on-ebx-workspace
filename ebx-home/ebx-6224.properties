################################################################
## Technical parameters for memory and performance tuning
################################################################
# Import commit threshold allows to specify the commit threshold
# exclusively for the archive import launched directly from Manager.
#
# For more details about the commit threshold, see the JavaDoc ProcedureContext.setCommitThreshold().
# Default value is 0.
#
ebx.manager.import.commit.threshold=100
# Specifies query cache parameters
# There is one query cache per repository.
# Activate query cache statistics. The default value is false.
# When set to true, the query caches statistics are available.
#ebx.cache.query.statisticsActivated=false
# Set the max number of entries in the cache. The default value is 2000
# When set to 0, the cache is deactivated.
#ebx.cache.query.maxEntries=2000
# Set the expiration duration of cache entries in minutes. The default value is 1 minute.
#ebx.cache.query.entryExpirationInMinutes=1
# Activate query result cache statistics. The default value is false.
# When set to true, the query result caches statistics are available.
#ebx.cache.queryResult.statisticsActivated=false
# Set the max number of entries in the query result cache. The default value is 100
# When set to 0, the cache is deactivated.
#ebx.cache.queryResult.maxEntries=100
# Set the expiration duration of query result cache entries in minutes. The default value is 10 minutes.
#ebx.cache.queryResult.entryExpirationInMinutes=10
# Set the max number of entries in the SQL cache. The default value is 2000
# When set to 0, the cache is deactivated.
#ebx.cache.sql.maxEntries=2000
# Set the expiration duration of SQL cache entries in minutes. The default value is 60 minutes.
#ebx.cache.sql.entryExpirationInMinutes=60
# Activate the request cache, which can improve the performance of certain requests. Possible values are DISABLED,
# WITH_CHECK (ensures that a cached request executes the same query plan as its non-cached version, recommended),
# EXCEPTION (throws an exception if the query plan for a request differs from its non-cached version), and ENABLED.
# The default value is WITH_CHECK.
#ebx.cache.request.mode=WITH_CHECK
# Set the max number of entries in the request cache. The default value is 2000
# When set to 0, the cache is deactivated.
#ebx.cache.request.maxEntries=2000
# Set the expiration duration of request cache entries in minutes. The default value is 10 minutes.
#ebx.cache.request.entryExpirationInMinutes=10
# Activate request cache statistics. The default value is false.
#ebx.cache.request.statisticsActivated=false
# Activates query hoisting: automatic replacement of literals with parameters. On the one hand
# this feature can result in a higher hit rate on the query cache; on the other hand there are some
# optimizations that can be applied to literals that cannot be applied to parameters, so in certain
# queries hoisting can lead to a sub-optimal performance.
# Possible values are: ALWAYS, NEVER, AUTO (i.e. let the query optimizer decide when to apply hoisting).
# The default value is AUTO.
#ebx.query.hoistLiterals=AUTO
# Changes the way how a child dataset is validated. This affects only the performance of the validation,
# but not the content of the resulting validation report. In the FULL mode, the report of the tables
# will be cleared, then the tables will be validated as if performing an initial validation.
# In the DIFF mode, the algorithm calculates the differences since the last validation
# and processes them to perform the necessary updates on the validation report.
# Possible values are: FULL, DIFF.
# The default is DIFF.
#ebx.validation.childDataset.mode=DIFF
